kind = "web"
previewPath = "/"
title = "AI Content Studio"
version = "1.0.0"
id = "artifacts/web-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22965

[services.development]
run = "pnpm --filter @workspace/web-app run dev"

[services.production]
run = "pnpm --filter @workspace/web-app run start"
build = [ "pnpm", "--filter", "@workspace/web-app", "run", "build" ]

[services.env]
PORT = "22965"
BASE_PATH = "/"
